# Generated by continuous — do not edit outside the project setup section.
# Regenerate with: uvx continuous update

name: cd-ci-fix
on:
  workflow_run:
    workflows: [ci, publish-docs]
    types: [completed]
    branches: [main]

jobs:
  fix-ci:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

      # --- project setup (edit this section) ---
      - uses: ./.github/actions/claude-setup
      - run: echo "CARGO_TERM_COLOR=always" >> "$GITHUB_ENV"
      - run: echo "RUSTFLAGS=-C debuginfo=0" >> "$GITHUB_ENV"
      - run: echo "RUSTDOCFLAGS=-Dwarnings" >> "$GITHUB_ENV"
      # --- end project setup ---

      - uses: max-sixty/continuous@v1
        with:
          github_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          bot_name: worktrunk-bot
          bot_id: "254187624"
          system_prompt_append: "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."
          prompt: |
            /fix-ci ${{ github.event.workflow_run.id }}
            - Run URL: ${{ github.event.workflow_run.html_url }}
            - Commit: ${{ github.event.workflow_run.head_sha }}
            - Commit message: ${{ github.event.workflow_run.head_commit.message }}

