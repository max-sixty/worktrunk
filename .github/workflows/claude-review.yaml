name: claude-review
# Two modes: automatic review on non-draft PRs, and responding to formal reviews
# on bot-authored PRs. Delegates to max-sixty/continuous for execution.
on:
  pull_request_target:
    types: [opened, synchronize, ready_for_ready, reopened]
  pull_request_review:
    types: [submitted]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C debuginfo=0"
  RUSTDOCFLAGS: "-Dwarnings"

jobs:
  review:
    if: |
      (github.event_name == 'pull_request_target' &&
        github.event.pull_request.draft == false) ||
      (github.event_name == 'pull_request_review' &&
        github.event.pull_request.user.login == 'worktrunk-bot' &&
        github.event.review.user.login != 'worktrunk-bot' &&
        (github.event.review.state != 'approved' || github.event.review.body))
    concurrency:
      group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    uses: max-sixty/continuous/.github/workflows/review.yaml@main
    with:
      bot_name: worktrunk-bot
      bot_id: "254187624"
      pr_number: ${{ github.event.pull_request.number }}
      event_name: ${{ github.event_name }}
      event_json: ${{ toJSON(github.event) }}
      trigger_phrase: "@worktrunk-bot"
      review_prompt: /review-pr ${{ github.event.pull_request.number }}
      system_prompt_append: "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."
    secrets:
      bot_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
      claude_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
