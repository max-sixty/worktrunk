name: claude-issue-triage
# Automatic triage when new issues are opened. Delegates to max-sixty/continuous.
on:
  issues:
    types: [opened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C debuginfo=0"
  RUSTDOCFLAGS: "-Dwarnings"

jobs:
  triage:
    # Skip bot-created issues and issues from worktrunk-bot
    if: >-
      github.event.issue.user.type != 'Bot' &&
      github.event.issue.user.login != 'worktrunk-bot'
    uses: max-sixty/continuous/.github/workflows/triage.yaml@main
    with:
      bot_name: worktrunk-bot
      bot_id: "254187624"
      issue_number: ${{ github.event.issue.number }}
      prompt: "triage-issue ${{ github.event.issue.number }}"
      system_prompt_append: "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."
    secrets:
      bot_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
      claude_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
