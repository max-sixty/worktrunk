name: claude-mention
# Handles @worktrunk-bot mentions and bot-engaged conversations.
# Routes to three continuous reusable workflows based on event type.
on:
  issues:
    types: [edited]
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]

jobs:
  # Engagement verification — gate for non-mention comments.
  # Runs as a separate job so the routing jobs can depend on its result.
  verify:
    if: |
      (github.event_name == 'issues' &&
        contains(github.event.issue.body, '@worktrunk-bot') &&
        github.event.issue.user.login != 'worktrunk-bot') ||
      (github.event_name == 'issue_comment' &&
        github.event.comment.user.login != 'worktrunk-bot') ||
      (github.event_name == 'pull_request_review_comment' &&
        github.event.comment.user.login != 'worktrunk-bot')
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Verify bot engagement
        id: check
        run: |
          # Mentions always run
          if [ "$EVENT_NAME" = "issues" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$COMMENT_BODY" ] && echo "$COMMENT_BODY" | grep -qF '@worktrunk-bot'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Non-mention: check bot engagement
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            ISSUE_NUMBER="${{ github.event.issue.number }}"

            if [ -z "${{ github.event.issue.pull_request.url }}" ]; then
              ISSUE_AUTHOR="${{ github.event.issue.user.login }}"
              if [ "$ISSUE_AUTHOR" = "worktrunk-bot" ]; then
                echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
              fi
              if echo "$ISSUE_BODY" | grep -qF '@worktrunk-bot'; then
                echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
              fi
              BOT_COMMENTS=$(gh api "repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/comments" \
                --jq '[.[] | select(.user.login == "worktrunk-bot")] | length')
              if [ "$BOT_COMMENTS" -gt "0" ]; then
                echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
              fi
              echo "should_run=false" >> "$GITHUB_OUTPUT"; exit 0
            fi

            PR_NUMBER="$ISSUE_NUMBER"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          PR_AUTHOR=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json author --jq '.author.login')
          if [ "$PR_AUTHOR" = "worktrunk-bot" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          BOT_REVIEWS=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" \
            --jq '[.[] | select(.user.login == "worktrunk-bot")] | length')
          if [ "$BOT_REVIEWS" -gt "0" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          BOT_COMMENTS=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --jq '[.[] | select(.user.login == "worktrunk-bot")] | length')
          if [ "$BOT_COMMENTS" -gt "0" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          echo "should_run=false" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: React to mention
        if: |
          steps.check.outputs.should_run == 'true'
          && github.event.comment
          && contains(github.event.comment.body, '@worktrunk-bot')
        run: |
          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" -f content=eyes 2>/dev/null || \
          gh api "repos/$REPO/pulls/comments/$COMMENT_ID/reactions" -f content=eyes 2>/dev/null || true
        env:
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
          GH_TOKEN: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

  # Route: issue_comment events
  comment:
    needs: verify
    if: |
      needs.verify.outputs.should_run == 'true' &&
      github.event_name == 'issue_comment'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: max-sixty/continuous/.github/workflows/mention-comment.yaml@main
    with:
      bot_name: worktrunk-bot
      bot_id: "254187624"
      comment_url: ${{ github.event.comment.html_url }}
      is_mention: ${{ contains(github.event.comment.body, '@worktrunk-bot') }}
      is_pr: ${{ github.event.issue.pull_request.url != '' }}
      issue_or_pr_number: ${{ github.event.issue.number }}
      system_prompt_append: "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."
    secrets:
      bot_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
      claude_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  # Route: pull_request_review_comment events
  review-comment:
    needs: verify
    if: |
      needs.verify.outputs.should_run == 'true' &&
      github.event_name == 'pull_request_review_comment'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: max-sixty/continuous/.github/workflows/mention-review.yaml@main
    with:
      bot_name: worktrunk-bot
      bot_id: "254187624"
      pr_number: ${{ github.event.pull_request.number }}
      comment_url: ${{ github.event.comment.html_url }}
      comment_id: ${{ github.event.comment.id }}
      is_mention: ${{ contains(github.event.comment.body, '@worktrunk-bot') }}
      repository: ${{ github.repository }}
      system_prompt_append: "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."
    secrets:
      bot_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
      claude_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  # Route: issues:edited events with @bot mention
  issue-edit:
    needs: verify
    if: |
      needs.verify.outputs.should_run == 'true' &&
      github.event_name == 'issues'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: max-sixty/continuous/.github/workflows/mention-issue-edit.yaml@main
    with:
      bot_name: worktrunk-bot
      bot_id: "254187624"
      issue_url: ${{ github.event.issue.html_url }}
      issue_number: ${{ github.event.issue.number }}
      system_prompt_append: "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."
    secrets:
      bot_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
      claude_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
