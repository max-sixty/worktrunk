name: claude-nightly-cleaner
# Nightly code quality sweep. Delegates to max-sixty/continuous.
on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C debuginfo=0"
  RUSTDOCFLAGS: "-Dwarnings"

jobs:
  cleaner:
    uses: max-sixty/continuous/.github/workflows/nightly.yaml@main
    with:
      bot_name: worktrunk-bot
      bot_id: "254187624"
      prompt: /nightly-cleaner
      system_prompt_append: "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."
    secrets:
      bot_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
      claude_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
