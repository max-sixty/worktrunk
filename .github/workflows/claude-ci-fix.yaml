name: claude-ci-fix
# Trigger when CI or docs workflow fails on main. Delegates to max-sixty/continuous.
on:
  workflow_run:
    workflows: [ci, publish-docs]
    types: [completed]
    branches: [main]

jobs:
  fix-ci:
    if: github.event.workflow_run.conclusion == 'failure'
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write
    uses: max-sixty/continuous/.github/workflows/ci-fix.yaml@main
    with:
      bot_name: worktrunk-bot
      bot_id: "254187624"
      run_id: ${{ github.event.workflow_run.id }}
      run_url: ${{ github.event.workflow_run.html_url }}
      head_sha: ${{ github.event.workflow_run.head_sha }}
      commit_message: ${{ github.event.workflow_run.head_commit.message }}
      prompt: |
        /fix-ci ${{ github.event.workflow_run.id }}
        - Run URL: ${{ github.event.workflow_run.html_url }}
        - Commit: ${{ github.event.workflow_run.head_sha }}
        - Commit message: ${{ github.event.workflow_run.head_commit.message }}
      system_prompt_append: "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."
    secrets:
      bot_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
      claude_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
