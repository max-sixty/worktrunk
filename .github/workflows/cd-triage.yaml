# Generated by continuous — do not edit outside the project setup section.
# Regenerate with: uvx continuous update

name: cd-triage
on:
  issues:
    types: [opened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    if: >-
      github.event.issue.user.type != 'Bot' &&
      github.event.issue.user.login != 'worktrunk-bot'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}

      # --- project setup (edit this section) ---
      - uses: ./.github/actions/claude-setup
      - run: echo "CARGO_TERM_COLOR=always" >> "$GITHUB_ENV"
      - run: echo "RUSTFLAGS=-C debuginfo=0" >> "$GITHUB_ENV"
      - run: echo "RUSTDOCFLAGS=-Dwarnings" >> "$GITHUB_ENV"
      # --- end project setup ---

      - uses: max-sixty/continuous@v1
        with:
          github_token: ${{ secrets.WORKTRUNK_BOT_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          bot_name: worktrunk-bot
          bot_id: "254187624"
          system_prompt_append: "You are operating in a GitHub Actions CI environment. Use /running-in-ci before starting work."
          prompt: "/triage-issue ${{ github.event.issue.number }}"

