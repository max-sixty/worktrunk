version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore: "
    # Bump all patch versions of rust dependencies as a single PR
    groups:
      patch:
        update-types:
          - patch
    # Exclude labels due to https://github.com/dependabot/dependabot-core/issues/7645#issuecomment-1986212847
    labels: []

  - package-ecosystem: "github-actions"
    directory: "/"
    commit-message:
      prefix: "chore: "
    schedule:
      interval: daily
    labels: []
    ignore:
      # v1.6.2 normalizes any multi-package list to an empty string and then
      # aborts with "Packages argument is empty" (upstream PR #177 quoted
      # `${packages}` so apt_query treats the whole list as one package name).
      # Tracked at awalsh128/cache-apt-pkgs-action#210. Drop this entry once a
      # fixed release ships so Dependabot can bump forward again.
      - dependency-name: "awalsh128/cache-apt-pkgs-action"
        versions: ["1.6.2"]
