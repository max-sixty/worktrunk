name: test setup
description: |
  Cargo test tooling, rust-cache, and the shells our PTY tests exercise.
  Used by the test matrix and the cargo-affected jobs (which add their own
  cargo-affected + llvm-tools steps after this).

runs:
  using: composite
  steps:
    - name: Install cargo-insta
      uses: baptiste0928/cargo-install@v3
      with:
        crate: cargo-insta
        version: "=1.48.0"

    - name: Install cargo-nextest
      uses: baptiste0928/cargo-install@v3
      with:
        crate: cargo-nextest
        version: "=0.9.138"

    - name: 💰 Cache
      uses: Swatinem/rust-cache@v2
      with:
        # Don't cache ~/.cargo/bin. The runner-image rustup binary acts as
        # the cargo/rustc/rustup proxy; restoring a stale copy on top of a
        # new image leaves the proxy resolving as `rustup-init`, breaking
        # `cargo install` (only exposed when the install is a cache miss).
        # Tools we need are installed via baptiste0928/cargo-install into a
        # separate `--root`, so nothing else in here relies on ~/.cargo/bin.
        cache-bin: false
        # Bumped to invalidate caches that already include the stale bin.
        prefix-key: v1-rust

    - name: Install shells (zsh, fish) - Ubuntu
      if: runner.os == 'Linux'
      uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1 — pin SHA; upstream force-moves tags (v1.6.1 now resolves to the broken v1.6.2, awalsh128/cache-apt-pkgs-action#210)
      with:
        packages: zsh fish
        version: 1.0

    - name: Install shells (fish) - macOS
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install fish
        # bash and zsh are pre-installed on macOS

    - name: Install nushell
      if: runner.os != 'Windows'
      uses: hustcer/setup-nu@v3
      with:
        version: '0.113.1'
