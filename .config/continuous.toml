bot_name = "worktrunk-bot"

[secrets]
bot_token = "WORKTRUNK_BOT_TOKEN"
claude_token = "CLAUDE_CODE_OAUTH_TOKEN"

[setup]
uses = ["./.github/actions/claude-setup"]

[workflows.review]
prompt = "/review-pr {pr_number}"

[workflows.mention]

[workflows.triage]
prompt = "/triage-issue {issue_number}"

[workflows.ci-fix]
watched_workflows = ["ci", "publish-docs"]
prompt = "/fix-ci {run_id}"

[workflows.nightly]
cron = "17 6 * * *"
prompt = "/nightly-cleaner"

[workflows.renovate]
cron = "17 9 * * 0"
